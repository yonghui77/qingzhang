<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1677ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="轻账">
  <meta name="format-detection" content="telephone=no">
  <title>轻账</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div>
        <p class="eyebrow" id="monthLabel"></p>
        <h1 id="pageTitle">我的账本</h1>
      </div>
      <button class="icon-button primary" id="headerAddButton" aria-label="记一笔">＋</button>
    </header>

    <main>
      <section class="page active" data-page="home">
        <div class="month-switcher">
          <button class="ghost-button" id="previousMonth" aria-label="上个月">‹</button>
          <button class="month-button" id="currentMonthButton"></button>
          <button class="ghost-button" id="nextMonth" aria-label="下个月">›</button>
        </div>

        <article class="card balance-card">
          <p class="muted">本月结余</p>
          <strong class="balance" id="balanceValue">¥0</strong>
          <div class="summary-grid">
            <div>
              <span class="summary-dot income"></span>
              <small>收入</small>
              <b id="incomeValue">¥0</b>
            </div>
            <div>
              <span class="summary-dot expense"></span>
              <small>支出</small>
              <b id="expenseValue">¥0</b>
            </div>
          </div>
        </article>

        <article class="card" id="budgetCard">
          <div class="section-heading">
            <h2>本月预算</h2>
            <span class="muted" id="budgetRemaining"></span>
          </div>
          <div class="progress-track"><div class="progress-value" id="budgetProgress"></div></div>
          <div class="progress-caption">
            <span id="budgetUsed"></span>
            <span id="budgetPercent"></span>
          </div>
        </article>

        <article class="card">
          <div class="section-heading">
            <h2>支出分类</h2>
          </div>
          <div id="categoryStats"></div>
        </article>

        <article class="card">
          <div class="section-heading">
            <h2>最近记录</h2>
          </div>
          <div id="recentEntries"></div>
        </article>
      </section>

      <section class="page" data-page="records">
        <div class="search-wrap">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="搜索备注或分类">
        </div>
        <div class="segmented" id="recordFilters">
          <button class="active" data-filter="all">全部</button>
          <button data-filter="expense">支出</button>
          <button data-filter="income">收入</button>
        </div>
        <div id="recordList"></div>
      </section>

      <section class="page" data-page="settings">
        <article class="card settings-card">
          <h2>每月预算</h2>
          <label class="field-row">
            <span>预算金额</span>
            <span class="input-suffix">
              <input id="budgetInput" inputmode="decimal" type="number" min="0" step="0.01">
              <em>元</em>
            </span>
          </label>
          <button class="wide-button primary" id="saveBudgetButton">保存预算</button>
        </article>

        <article class="card settings-card">
          <h2>数据</h2>
          <button class="settings-action" id="exportButton"><span>导出备份</span><b>›</b></button>
          <label class="settings-action">
            <span>恢复备份</span><b>›</b>
            <input id="importInput" type="file" accept="application/json,.json" hidden>
          </label>
          <button class="settings-action danger" id="clearButton"><span>清空全部记录</span><b>›</b></button>
        </article>

        <article class="card about-card">
          <div><span>应用</span><b>轻账</b></div>
          <div><span>数据存储</span><b>仅保存在本机</b></div>
          <div><span>版本</span><b>1.0 PWA</b></div>
        </article>
      </section>
    </main>

    <nav class="tabbar">
      <button class="active" data-tab="home"><span>⌂</span><small>首页</small></button>
      <button data-tab="records"><span>☷</span><small>明细</small></button>
      <button data-tab="settings"><span>⚙</span><small>设置</small></button>
    </nav>
  </div>

  <dialog id="entryDialog">
    <form method="dialog" id="entryForm">
      <div class="sheet-header">
        <button type="button" class="text-button" id="cancelEntryButton">取消</button>
        <h2 id="entryDialogTitle">记一笔</h2>
        <button type="submit" class="text-button strong">保存</button>
      </div>

      <div class="segmented large">
        <button type="button" class="active" data-entry-type="expense">支出</button>
        <button type="button" data-entry-type="income">收入</button>
      </div>

      <label class="amount-field">
        <span>¥</span>
        <input id="amountInput" required inputmode="decimal" type="number" min="0.01" step="0.01" placeholder="0">
      </label>

      <section>
        <h3>选择分类</h3>
        <div class="category-grid" id="categoryPicker"></div>
      </section>

      <section class="form-card">
        <label><span>日期</span><input id="dateInput" required type="date"></label>
        <label><span>备注</span><input id="noteInput" maxlength="80" placeholder="写点什么（选填）"></label>
      </section>

      <button type="button" class="delete-entry-button" id="deleteEntryButton">删除这条记录</button>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status"></div>
  <script src="app.js"></script>
</body>
</html>
